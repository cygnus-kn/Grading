<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Grading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="preload">
    <script>
      (function() {
        try {
          var currentTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (currentTheme === 'dark' || (!currentTheme && prefersDark)) {
            document.body.classList.add('dark-theme');
          }
        } catch (e) {}
        setTimeout(function() {
          document.body.classList.remove('preload');
        }, 50);
      })();
    </script>
    <!-- Background element for the glass effect to sit on -->
    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Toggle (Floats over content) -->
        <div class="main-top-bar">
            <button class="sidebar-toggle-btn" id="sidebarCollapseBtn" aria-label="Toggle sidebar">
                <!-- SVG injected by JS -->
            </button>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <!-- Header content if needed -->
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Populated by JS -->
            </nav>
            <div class="sidebar-footer">
                <div id="themeToggle" class="theme-toggle" role="switch" aria-label="Toggle dark mode" tabindex="0">
                    <div class="toggle-knob"></div>
                    <svg class="toggle-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="toggle-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </div>
            </div>
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
        </aside>


        <!-- Main Content -->
        <div class="container">
        <div class="tabs-bar" id="tabsBar" role="tablist" aria-label="Open classes">
            <!-- Populated by JS -->
        </div>
        <header>
            <div class="header-text">
                <div class="day-selector-wrapper">
                    <select id="day-select" class="day-dropdown">
                        <option value="1">Day 1</option>
                        <option value="2">Day 2</option>
                        <option value="3">Day 3</option>
                    </select>
                </div>
            </div>
            <div id="loading-indicator" class="hidden spinner"></div>
        </header>

        <main>
            <div id="submissions-list" class="submissions-list">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>
    </div> <!-- End app-layout -->

    <!-- Template for a Student Group -->
    <template id="student-template">
        <div class="student-group">
            <div class="student-header-box">
                <span class="student-name"></span>
                <span class="chevron-icon">▾</span>
            </div>
            <div class="answers-container">
                <!-- Answer rows injected here -->
            </div>
        </div>
    </template>

    <!-- Template for an Answer Row -->
    <template id="answer-template">
        <div class="answer-row">
            <div class="q-label">
                <span class="q-text"></span>
            </div>
            
            <div class="audio-player-compact">
                <button class="play-mini-btn">▶</button>
                <div class="scrubber-container">
                    <div class="scrubber-track">
                        <div class="scrubber-progress"></div>
                        <div class="scrubber-knob"></div>
                    </div>
                </div>
                <span class="time-display">00/01</span>
                <audio class="hidden-audio"></audio>
            </div>

            <div class="feedback-mini-section">
                <input type="text" class="feedback-input" placeholder="Write feedback notes...">
                <button class="send-btn" title="Send to Sheets">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
